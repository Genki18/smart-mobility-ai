services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    networks:
      - frontend-vpc

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - R2_ENDPOINT_URL=https://7214442e7ee196a4250dc4423a23e2fb.r2.cloudflarestorage.com
      - R2_ACCESS_KEY_ID=4b11b79193a845bcb5255e68db10ee22
      - R2_SECRET_ACCESS_KEY=5626a61fb49ef53c55ad81a6236c2263ed3d0c181283f16b8dcf75920140b0a8
      - R2_BUCKET_NAME=smart-mobility-logs
    networks:
      - frontend-vpc
      - backend-vpc
      - ai-vpc

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smartmobility
      POSTGRES_USER: smart
      POSTGRES_PASSWORD: smartpass
    ports:
      - "5432:5432"
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql
    networks:
      - backend-vpc
      - db-vpc

  minio:
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - storage-vpc

networks:
  frontend-vpc:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24
  backend-vpc:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/24
  db-vpc:
    driver: bridge
    ipam:
      config:
        - subnet: 172.23.0.0/24
  storage-vpc:
    driver: bridge
    ipam:
      config:
        - subnet: 172.24.0.0/24
  ai-vpc:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/24
